<!doctype html>
<html lang="en" class="h-full">

<head>
    <include src="./elements/head.html" locals='{
        "module": "./ts/devices.ts"
    }'></include>
</head>

<body class="flex flex-col h-full bg-base-100 text-base-content">
    <include src="./elements/navbar.html"></include>

    <main class="flex-grow">
        <div class="container mx-auto pt-8 px-4">
            <h1 class="text-5xl font-bold">
                <a class="no-underline inline-block align-middle mr-2" href="/"><i class="bi bi-arrow-up-circle"></i></a>
                <span class="align-middle">Setup some devices</span>
            </h1>
            <p class="w-full text-xl mt-4">
                Create one or many devices for various mqtt topics.
            </p>
        </div>

        <div class="container mx-auto px-4 mt-8" id="divDevices"></div>
    </main>

    <dialog id="modalSettings" class="modal">
        <div class="modal-box max-w-3xl">
            <form method="dialog">
                <button class="btn btn-sm btn-circle btn-ghost absolute right-2 top-2">✕</button>
            </form>
            <h3 class="font-bold text-lg">Device Settings</h3>
            <form id="formSettings" class="mt-4">
                <div class="flex items-center space-x-2 hidden mb-4" id="spinnerSettings">
                    <span class="loading loading-spinner text-primary"></span>
                    <span>Loading...</span>
                </div>
                <div class="alert alert-error pdl-error-modal hidden mb-4" role="alert"></div>
                <div class="grid grid-cols-1 md:grid-cols-12 gap-4">
                    <div class="md:col-span-12">
                        <label for="selectTopic" class="label">
                            <span class="label-text">Topic</span>
                        </label>
                        <select id="selectTopic" class="select select-bordered w-full" required>
                            <option value="0" selected>Select Topic</option>
                        </select>
                    </div>
                    <div class="md:col-span-7">
                        <label for="inputName" class="label">
                            <span class="label-text">Name</span>
                        </label>
                        <input type="text" class="input input-bordered w-full" id="inputName" required>
                    </div>
                    <div class="md:col-span-5">
                        <label for="selectKind" class="label">
                            <span class="label-text">Type</span>
                        </label>
                        <select id="selectKind" class="select select-bordered w-full" required>
                            <option value="" selected>Select Type</option>
                            <option value="controlling">Control</option>
                            <option value="dimmable">Dimmable</option>
                            <option value="informational">Informational</option>
                            <option value="positionable">Positionable</option>
                            <option value="toggleable">Toggleable</option>
                        </select>
                    </div>
                    <div class="md:col-span-4">
                        <label for="inputStateKey" class="label">
                            <span class="label-text">State Key</span>
                        </label>
                        <input type="text" class="input input-bordered w-full" id="inputStateKey">
                    </div>
                    <div class="md:col-span-4">
                        <label for="inputSetKey" class="label">
                            <span class="label-text">Set Key</span>
                        </label>
                        <input type="text" class="input input-bordered w-full" id="inputSetKey">
                    </div>
                    <div class="md:col-span-4">
                        <label for="inputSetSuffix" class="label">
                            <span class="label-text">Set Topic Suffix</span>
                        </label>
                        <input type="text" class="input input-bordered w-full" id="inputSetSuffix">
                    </div>
                    <div class="md:col-span-6">
                        <label for="inputValueOn" class="label">
                            <span class="label-text">Value On</span>
                        </label>
                        <input type="text" class="input input-bordered w-full" id="inputValueOn">
                    </div>
                    <div class="md:col-span-6">
                        <label for="inputValueOff" class="label">
                            <span class="label-text">Value Off</span>
                        </label>
                        <input type="text" class="input input-bordered w-full" id="inputValueOff">
                    </div>
                    <div class="md:col-span-12 hidden" id="divOtherStatus"></div>
                </div>
                <div class="modal-action">
                    <button type="button" class="btn btn-ghost" onclick="modalSettings.close()">Close</button>
                    <button type="submit" class="btn btn-primary">Save</button>
                </div>
            </form>
        </div>
    </dialog>

    <dialog id="modalStatus" class="modal">
        <div class="modal-box max-w-3xl">
            <form method="dialog">
                <button class="btn btn-sm btn-circle btn-ghost absolute right-2 top-2">✕</button>
            </form>
            <h3 class="font-bold text-lg">Device Status</h3>
            <form id="formStatus" class="mt-4">
                <div class="flex items-center space-x-2 hidden mb-4" id="spinnerStatus">
                    <span class="loading loading-spinner text-primary"></span>
                    <span>Loading...</span>
                </div>
                <div class="alert alert-error pdl-error-modal hidden mb-4" role="alert"></div>
                <div class="grid grid-cols-1 md:grid-cols-12 gap-4">
                    <div class="md:col-span-9">
                        <label for="inputStatusKey" class="label">
                            <span class="label-text">Status Key</span>
                        </label>
                        <input type="text" class="input input-bordered w-full" id="inputStatusKey" required>
                    </div>
                    <div class="md:col-span-3">
                        <label for="selectStatusShown" class="label">
                            <span class="label-text">Shown</span>
                        </label>
                        <select id="selectStatusShown" class="select select-bordered w-full" required>
                            <option value="0" selected>No</option>
                            <option value="1">Yes</option>
                        </select>
                    </div>
                    <div class="md:col-span-12">
                        <label for="inputStatusName" class="label">
                            <span class="label-text">Display Name</span>
                        </label>
                        <input type="text" class="input input-bordered w-full" id="inputStatusName" required>
                    </div>
                </div>
                <div class="modal-action">
                    <button type="button" class="btn btn-ghost" onclick="modalStatus.close()">Close</button>
                    <button type="submit" class="btn btn-primary">Save</button>
                </div>
            </form>
        </div>
    </dialog>

    <include src="./elements/footer.html"></include>
</body>

</html>
